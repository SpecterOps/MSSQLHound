name: CI

on:
  workflow_dispatch:
  push:
    branches: [go]
  # pull_request:
  #   branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run unit tests
        run: go test -v -count=1 -timeout 10m ./...

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Start Samba AD DC
        run: |
          docker run -d --privileged \
            --name dc --hostname DC \
            -e REALM='MAYYHEM.COM' \
            -e DOMAIN='MAYYHEM' \
            -e ADMIN_PASS='P@ssw0rd' \
            -e DNS_FORWARDER='8.8.8.8' \
            -e BIND_NETWORK_INTERFACES='false' \
            diegogslomp/samba-ad-dc

      - name: Wait for Samba AD DC
        run: |
          echo "Waiting for Samba provisioning and startup..."
          sudo apt-get install -y ldap-utils > /dev/null 2>&1 || true

          # Get the container IP on the default bridge network
          for i in $(seq 1 10); do
            DC_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' dc)
            if [ -n "$DC_IP" ]; then
              echo "DC container IP: $DC_IP"
              break
            fi
            sleep 1
          done
          if [ -z "$DC_IP" ]; then
            echo "Failed to get DC container IP"
            docker inspect dc
            exit 1
          fi

          # Save for subsequent steps
          echo "DC_IP=$DC_IP" >> $GITHUB_ENV

          for i in $(seq 1 120); do
            if ldapsearch -x -H ldap://$DC_IP -b "" -s base namingContexts 2>/dev/null | grep -q "mayyhem"; then
              echo "Samba AD DC is ready (LDAP responding)"
              ldapsearch -x -H ldap://$DC_IP -b "" -s base namingContexts
              exit 0
            fi
            if [ "$i" -eq 120 ]; then
              echo "Timed out waiting for Samba AD DC"
              echo "Container: $(docker ps -a --filter name=dc --format '{{.Status}}')"
              echo "Port 389 test:"
              timeout 3 bash -c "echo > /dev/tcp/$DC_IP/389" && echo "open" || echo "closed"
              echo "Port 88 test:"
              timeout 3 bash -c "echo > /dev/tcp/$DC_IP/88" && echo "open" || echo "closed"
              echo "--- FULL container logs ---"
              docker logs dc 2>&1 | tail -100
              echo "--- Container inspect (State) ---"
              docker inspect dc --format '{{json .State}}' | python3 -m json.tool
              exit 1
            fi
            if [ $((i % 20)) -eq 0 ]; then
              echo "Container: $(docker ps --filter name=dc --format '{{.Status}}')"
              timeout 3 bash -c "echo > /dev/tcp/$DC_IP/389" && echo "Port 389: open" || echo "Port 389: closed"
            fi
            echo "Waiting for Samba AD DC... ($i/120)"
            sleep 3
          done

      - name: Verify host can reach DC
        run: |
          echo "DC IP: $DC_IP"
          ping -c 2 -W 2 $DC_IP
          echo "LDAP (389):"
          timeout 5 bash -c "echo > /dev/tcp/$DC_IP/389" && echo "OK" || echo "FAILED"
          echo "Kerberos (88):"
          timeout 5 bash -c "echo > /dev/tcp/$DC_IP/88" && echo "OK" || echo "FAILED"

      - name: Create AD accounts and keytab
        run: |
          docker exec dc samba-tool user create domainadmin 'P@ssw0rd' --use-username-as-cn
          docker exec dc samba-tool group addmembers "Domain Admins" domainadmin

          docker exec dc samba-tool user create sqlsvc 'P@ssw0rd' --use-username-as-cn
          HOSTNAME=$(hostname)
          docker exec dc samba-tool spn add MSSQLSvc/${HOSTNAME}.mayyhem.com sqlsvc
          docker exec dc samba-tool spn add MSSQLSvc/${HOSTNAME}.mayyhem.com:1433 sqlsvc

          docker exec dc samba-tool domain exportkeytab /tmp/mssql.keytab --principal=sqlsvc
          docker exec dc samba-tool domain exportkeytab /tmp/mssql.keytab \
            --principal=MSSQLSvc/${HOSTNAME}.mayyhem.com
          docker exec dc samba-tool domain exportkeytab /tmp/mssql.keytab \
            --principal=MSSQLSvc/${HOSTNAME}.mayyhem.com:1433
          docker cp dc:/tmp/mssql.keytab /tmp/mssql.keytab

      - name: Configure DNS and Kerberos
        run: |
          echo "$DC_IP dc.mayyhem.com dc mayyhem.com" | sudo tee -a /etc/hosts

          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y krb5-user

          sed 's/^          //' <<'KRBEOF' | sudo tee /etc/krb5.conf > /dev/null
          [libdefaults]
              default_realm = MAYYHEM.COM
              dns_lookup_realm = false
              dns_lookup_kdc = false

          [realms]
              MAYYHEM.COM = {
                  kdc = DC_IP_PLACEHOLDER
                  admin_server = DC_IP_PLACEHOLDER
                  default_domain = mayyhem.com
              }

          [domain_realm]
              .mayyhem.com = MAYYHEM.COM
              mayyhem.com = MAYYHEM.COM
          KRBEOF

          sudo sed -i "s/DC_IP_PLACEHOLDER/$DC_IP/g" /etc/krb5.conf
          echo "--- krb5.conf ---"
          cat /etc/krb5.conf

      - name: Verify Kerberos
        run: |
          echo 'P@ssw0rd' | kinit Administrator@MAYYHEM.COM
          klist

      - name: Install SQL Server 2022
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | \
            sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl -fsSL https://packages.microsoft.com/config/ubuntu/22.04/mssql-server-2022.list | \
            sudo tee /etc/apt/sources.list.d/mssql-server-2022.list
          sudo apt-get update
          sudo apt-get install -y mssql-server
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 || true

          sudo MSSQL_SA_PASSWORD='P@ssw0rd' MSSQL_PID='Developer' \
            /opt/mssql/bin/mssql-conf setup accept-eula

      - name: Configure SQL Server for AD auth
        run: |
          sudo mkdir -p /var/opt/mssql/secrets
          sudo cp /tmp/mssql.keytab /var/opt/mssql/secrets/mssql.keytab
          sudo chown mssql:mssql /var/opt/mssql/secrets/mssql.keytab
          sudo chmod 400 /var/opt/mssql/secrets/mssql.keytab

          sudo /opt/mssql/bin/mssql-conf set network.kerberoskeytabfile /var/opt/mssql/secrets/mssql.keytab
          sudo /opt/mssql/bin/mssql-conf set network.privilegedadaccount sqlsvc
          sudo systemctl restart mssql-server

          echo "Waiting for SQL Server to start..."
          for i in $(seq 1 30); do
            if /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'P@ssw0rd' -C -Q "SELECT 1" &>/dev/null; then
              echo "SQL Server is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "SQL Server failed to start"
              systemctl status mssql-server --no-pager || true
              sudo tail -50 /var/opt/mssql/log/errorlog || true
              exit 1
            fi
            sleep 2
          done

      - name: Create domainadmin as SQL sysadmin
        run: |
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'P@ssw0rd' -C -Q "
            CREATE LOGIN [MAYYHEM\domainadmin] FROM WINDOWS;
            ALTER SERVER ROLE [sysadmin] ADD MEMBER [MAYYHEM\domainadmin];
          "

      - name: Run integration tests
        env:
          MSSQL_SERVER: localhost
          MSSQL_USER: sa
          MSSQL_PASSWORD: P@ssw0rd
          MSSQL_DOMAIN: mayyhem.com
          LDAP_USER: Administrator@mayyhem.com
          LDAP_PASSWORD: P@ssw0rd
          MSSQL_SKIP_DOMAIN: "false"
          MSSQL_ACTION: all
          MSSQL_SKIP_HTML: "true"
        run: |
          export MSSQL_DC=$DC_IP
          go test -v -count=1 -tags integration -timeout 30m \
            -run TestIntegrationAll ./internal/collector/...
